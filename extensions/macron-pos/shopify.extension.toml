api_version = "2026-01"

[[extensions]]
type = "ui_extension"
# Change the merchant-facing name of the extension in locales/en.default.json
name = "t:name"
uid = "c759fc65-75f0-de50-374a-af70ce8e81123c4fac84"
handle = "macron-pos"
description = "A preact POS UI extension"

# module: file that contains your extension’s source code
# target: location where your extension appears in POS
[[extensions.targeting]]
module = "./src/Tile.jsx"
target = "pos.home.tile.render"

[[extensions.targeting]]
module = "./src/Modal.jsx"
target = "pos.home.modal.render"

[[extensions]]
type = "ui_extension"
name = "Gift Card Sale"
handle = "macron-pos-gift-card-sale"
description = "Macron POS gift card sale flow"

[[extensions.targeting]]
module = "./src/GiftCardTile.jsx"
target = "pos.home.tile.render"

[[extensions.targeting]]
module = "./src/GiftCardModal.jsx"
target = "pos.home.modal.render"
